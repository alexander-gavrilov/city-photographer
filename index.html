<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Photographer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #instructions {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            color: white;
            background-color: rgba(0,0,0,0.5);
            padding: 10px;
            z-index: 100;
            cursor: pointer;
        }
        #districtIndicator {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background-color: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            z-index: 100;
            transition: background-color 0.5s ease;
            border-left: 5px solid #ffcc00;
        }
        .district-downtown {
            border-left-color: #3498db;
        }
        .district-industrial {
            border-left-color: #e74c3c;
        }
        .district-residential {
            border-left-color: #2ecc71;
        }
        
        #districtDescription {
            position: absolute;
            top: 50px;
            right: 10px;
            max-width: 300px;
            color: white;
            background-color: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            line-height: 1.4;
            z-index: 99;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 1s ease, transform 0.7s ease;
        }
        
        #districtDescription.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        #districtDescription h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 5px;
        }
        
        #districtDescription p {
            margin: 0;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="instructions">Click to play<br>WASD or Arrow Keys to move</div>
    <div id="districtIndicator">District: Unknown</div>
    <div id="districtDescription">
        <h3>District Name</h3>
        <p>Description of this district will appear here when you enter a new area.</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/dat.gui.module.js" type="module"></script>
    <script src="js/districts.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
